# Home Assistant App: Open DroneLog (ebswift maintained fork)
# https://github.com/ebswift/open-dronelog-ha-addon

name: "Open DroneLog"
version: "3.3.1"
slug: open-dronelog
description: "Local-first drone flight log viewer with charts, maps, and analytics. Supports DJI and Litchi CSV formats."
url: "https://github.com/ebswift/open-dronelog-ha-addon"

# No image: line on HAOS 2026.6+.
# Local Dockerfile with explicit FROM is now used so the wrapper can run.

arch:
  - amd64
  - aarch64

startup: application
boot: auto

webui: "http://[HOST]:[PORT:8080]/"

# Map HAOS /share so users can drop logs in /share/drone-logs for auto-sync.
# read_only: false for reliable subdirectory handling on HAOS.
map:
  - type: share
    read_only: false
  - type: media
    read_only: true

ports:
  80/tcp: 8080
ports_description:
  80/tcp: "Open DroneLog web interface"

options:
  DJI_API_KEY: ""
  KEEP_UPLOADED_FILES: true
  SYNC_LOGS_PATH: ""
  SYNC_INTERVAL: ""
  LOG_LEVEL: "info"

schema:
  DJI_API_KEY: "str?"
  KEEP_UPLOADED_FILES: "bool"
  SYNC_LOGS_PATH: "str?"
  SYNC_INTERVAL: "str?"
  LOG_LEVEL: "list(trace|debug|info|warn|error)"

# /data is always provided by Supervisor for persistent storage
init: false
